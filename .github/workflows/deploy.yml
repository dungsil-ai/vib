name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Lint
        run: npm run lint

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Install lcov
        run: sudo apt-get update -y && sudo apt-get install -y lcov

      - name: Run unit tests
        run: npm run test:coverage
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Fix lcov data inconsistencies
        if: github.event_name == 'pull_request'
        run: lcov --ignore-errors inconsistent -a coverage/lcov.info -o coverage/lcov.info.tmp && mv coverage/lcov.info.tmp coverage/lcov.info

      - name: Verify coverage on PR
        if: github.event_name == 'pull_request'
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 1
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Build
        run: npm run build
        env:
          # Prisma generate and Next.js build do not connect to the database;
          # a placeholder URL is sufficient for type-checking and bundling.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          NEXTAUTH_SECRET: "ci-build-secret"
          NEXTAUTH_URL: "http://localhost:3000"

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vib
          POSTGRES_PASSWORD: vib
          POSTGRES_DB: vib_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "postgresql://vib:vib@localhost:5432/vib_test"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup database
        run: npx prisma migrate resolve --applied
        env:
          DATABASE_URL: "postgresql://vib:vib@localhost:5432/vib_test"

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: "postgresql://vib:vib@localhost:5432/vib_test"
          NEXTAUTH_SECRET: "ci-e2e-secret"
          NEXTAUTH_URL: "http://localhost:3000"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: "postgresql://vib:vib@localhost:5432/vib_test"
          NEXTAUTH_SECRET: "ci-e2e-secret"
          NEXTAUTH_URL: "http://localhost:3000"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
